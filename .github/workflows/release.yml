name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: root-linux-amd64

          # Native ARM64 runner — no cross-compilation, no Docker issues.
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: root-linux-arm64

          # Cross-compile from ARM64 macOS to Intel.
          # ort dropped x86_64-apple-darwin prebuilt in v2.0.0-rc.11, so we
          # supply Microsoft's official ORT dylib and dynamically link.
          # Ships as .tar.gz bundle (binary + dylib); installer extracts both.
          - os: macos-14
            target: x86_64-apple-darwin
            artifact: root-macos-amd64.tar.gz
            ort_manual: true

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: root-macos-arm64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: root-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # macOS Intel: download ORT dylib and set env vars for dynamic linking.
      - name: Download ONNX Runtime (macOS Intel)
        if: matrix.ort_manual
        run: |
          ORT_VERSION="1.23.2"
          TARBALL="onnxruntime-osx-x86_64-${ORT_VERSION}.tgz"
          curl -fsSL \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/${TARBALL}" \
            -o "/tmp/${TARBALL}"
          tar -xzf "/tmp/${TARBALL}" -C /tmp
          ORT_DIR="/tmp/onnxruntime-osx-x86_64-${ORT_VERSION}/lib"
          echo "ORT_LIB_LOCATION=${ORT_DIR}" >> "$GITHUB_ENV"
          echo "ORT_PREFER_DYNAMIC_LINK=1" >> "$GITHUB_ENV"
          echo "ORT_SKIP_DOWNLOAD=1" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p thinkingroot-cli

      # macOS Intel: bundle binary + ORT dylib into tar.gz (binary needs dylib at runtime).
      - name: Bundle binary + ORT dylib (macOS Intel)
        if: matrix.ort_manual
        run: |
          BIN="target/${{ matrix.target }}/release/root"
          ORT_DIR="/tmp/onnxruntime-osx-x86_64-1.23.2/lib"
          install_name_tool -add_rpath @executable_path "$BIN"
          mkdir -p /tmp/bundle
          cp "$BIN" /tmp/bundle/root
          cp "${ORT_DIR}/libonnxruntime.1.23.2.dylib" /tmp/bundle/
          cd /tmp/bundle && ln -sf libonnxruntime.1.23.2.dylib libonnxruntime.dylib
          tar czf "$GITHUB_WORKSPACE/root-macos-amd64.tar.gz" root libonnxruntime.1.23.2.dylib libonnxruntime.dylib

      - name: Rename binary
        if: ${{ !matrix.ort_manual }}
        shell: bash
        run: |
          BIN=target/${{ matrix.target }}/release/root
          [ -f "${BIN}.exe" ] && BIN="${BIN}.exe"
          cp "$BIN" ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate checksums.txt
        run: |
          cd artifacts
          for f in root-linux-amd64 root-linux-arm64 root-macos-amd64.tar.gz root-macos-arm64 root-windows-amd64.exe; do
            [ -f "$f" ] || { echo "Missing artifact: $f"; exit 1; }
          done
          sha256sum root-linux-amd64 \
                    root-linux-arm64 \
                    root-macos-amd64.tar.gz \
                    root-macos-arm64 \
                    root-windows-amd64.exe \
            > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          repository: DevbyNaveen/releases
          token: ${{ secrets.RELEASES_PAT }}
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            artifacts/root-linux-amd64
            artifacts/root-linux-arm64
            artifacts/root-macos-amd64.tar.gz
            artifacts/root-macos-arm64
            artifacts/root-windows-amd64.exe
            artifacts/checksums.txt
            scripts/install.sh
            scripts/install.ps1
          generate_release_notes: false
          draft: false
          fail_on_unmatched_files: true

  homebrew-bump:
    name: Bump Homebrew formula
    runs-on: ubuntu-latest
    needs: release
    continue-on-error: true
    steps:
      - uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: root
          homebrew-tap: DevbyNaveen/homebrew-thinkingroot
          tag-name: ${{ github.ref_name }}
          download-url: https://github.com/DevbyNaveen/releases/releases/download/${{ github.ref_name }}/root-macos-arm64
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_PR_PAT }}
